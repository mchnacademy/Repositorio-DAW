<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=ºº , initial-scale=1.0">
    <title>Ejemplo 1 de tablas HTML.</title>
    <style>
        table {
            width: 50%;
            /* Modifica el tamaño de la tbla de ancho*/
            border-collapse: collapse;
            /*Colapasa el borde para que la tabla se vea bien*/
            margin: 0 auto;
            /* Centrar la tabla (Aplica un borde alrededor de la tabla o sus elementos
            (filas, celdas, etc.))*/
        }

        th,
        td {
            border: 1px solid black;
            /*Crea un borde*/
            padding: 15px;
            /* Margen interior */
            text-align: center;
            /*Alinea el texto */
        }

        th {
            background-color: blue;
            /*Color de fondo*/
            color: white;
            /*Color de las letras (Cabeceras)*/
        }

        caption {
            caption-side: bottom;
            /* Hace que la leyenda este abajo*/
            font-style: italic;
            /*Cambia el estilo del caption a italica*/
            padding-top: 8px;
            /*Define el espacio interior entre el contenido y el borde de la celda.*/
        }
    </style>
</head>

<body>
    <header>
        <h1>Ranking OCU Marcas de Coches vs Fiabilidad.</h1>
    </header>

    <table>
        <caption>Mi primera tabla.</caption>
        <!-- Proporciona un título o descripción a la tabla, debe insertarse
        inmediatamente después de la etiqueta <table>. Es opcional, pero útil
        para describir el contenido de la tabla para los usuarios.-->
        <thead>
            <tr>
                <th>Ranking</th>
                <th>Marca</th>
                <th>Fiabilidad</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>Lexus</td>
                <td>98</td>
            </tr>

            <tr>
                <td>14</td>
                <td>BMW</td>
                <td>87</td>
            </tr>

            <tr>
                <td>26</td>
                <td>Volvo</td>
                <td>82</td>
            </tr>
        </tbody>

    </table>


</body>

</html>
