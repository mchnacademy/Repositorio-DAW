<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Tabla con colspan y rowspan</title>
    <style>
        table {
            border-collapse: collapse;
            margin: 20px;
        }

        td {
            border: 2px solid blue;
            padding: 10px;
            text-align: center;
            font-family: Arial; /* Esto es para cambiar la fuente de las letras*/
        }

        .turquesa {
            background-color: aquamarine;
        }

        .naranja {
            background-color: orangered;
        }
    </style>
</head>

<body>
    <header>
        <h1>Tabla usando colspan y rowspan.</h1>
    </header>

    <table>
        <tbody>

            <tr>
                <td class="turquesa" colspan="3">f11</td> <!--El class sirve para vrear una clase para poder añadirle
                estilos, es como el id cuando hacia enlaces, pero aqui es para meterlo debtro de <style>, pero debe 
                    ir con un punto de lante para que funcione, por eso he creado dos distintas.-->
                <td>f14</td>
                <td>f15</td>
                <td>f16</td>
            </tr>

            <tr>
                <td class="naranja" rowspan="2">f21</td>
                <td>f22</td>
                <td>f23</td>
                <td>f24</td>
                <td>f25</td>
                <td>f26</td>
            </tr>

            <tr>
                <td>f32</td>
                <td>f33</td>
                <td>f34</td>
                <td>f35</td>
                <td>f36</td>
            </tr>

            <tr>
                <td>f41</td>
                <td>f42</td>
                <td>f43</td>
                <td>f44</td>
                <td>f45</td>
                <td>f46</td>
            </tr>
        </tbody>

    </table>

</body>

</html>
