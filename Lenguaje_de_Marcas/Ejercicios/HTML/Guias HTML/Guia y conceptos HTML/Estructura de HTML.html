<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <header>
        <h1>Mi primera Pagina Web</h1>
    </header>
    <!--La etiqueta header sirve para definir una cabecera, como un titulo.-->

    <nav>
        <ul>
            <li>Alumnos de 1º de DAW.</li>
            <li>Asignaturas.</li>
            <li>Ordenadores.</li>
            <li>Apuntes.</li>
        </ul>
    </nav>
    <!--La etiqueta nav sirve para definir una seccion, como si fuese un menu principal.-->

    <aside>
        <blockquote>Primer elemento.</blockquote>
        <blockquote>Segundo elemento.</blockquote>
        <blockquote>Tercer elemento.</blockquote>
    </aside>
    <!--La etiqueta aside sirve para definir un contenido secundario.-->

    <section>
        <article>
            <header>
                <h1>TITULO PRIMER EJERCICIO</h1>
            </header>
            <p><strong>Ejercicio 1.</strong></p> <!--Strong sirve para resaltar texto importante.-->
            <p><em>Enunciado Ej 1.</em></p> <!--EM sirve para poner la letra en cursiva.-->
            <p><small>Ej 1.</small></p> <!--Small sirve para hacer el texto pequeño. -->

            <footer>
                <p>Fecha de entrega 30/12/2025</p>
            </footer>
        </article>
        <!--La etiqueta article sirve para contener un contenido autonomo.-->
    </section>
    <!--La etiqueta section sirve para definir una seccion de contenido independiente.-->

    <footer>
        <p>Esta es mi primera pagina web, UWU.</p>
    </footer>
    <!--La etiqueta footer sirve para definir un pie de una seccion o documento, para informacion de copyright o enlaces.-->

</body>

</html>
