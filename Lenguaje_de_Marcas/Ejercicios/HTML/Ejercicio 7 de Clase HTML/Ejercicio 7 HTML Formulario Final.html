<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header>
        <h1>Formulario DAW</h1>
    </header>

    <form action="https://jkorpela.fi/cgi-bin/echo.cgi" method="POST">
        <section>
            <fieldset>
                <legend>Datos Alumno</legend>

                <label for="nombre">Nombre del Alummno:</label>
                <input type="text" placeholder="Pon tu Nombre" id="nombre" name="nombre">

                <br><br>

                <label for="apellido">Apellido del Alumno:</label>
                <input type="text" placeholder="Pon tu Apellido" id="apellido" name="apellido">

                <br><br>

                <label>Fecha de Nacimiento:</label>
                <input type="date" id="nacimiento" name="nacimiento">

                <br><br>

                <label>DNI o NIA:</label>
                <input type="text" id="dni" name="dni" pattern="\d{8}[A-Za-z]" maxlength="9" required
                    placeholder="12345678A">

                <br><br>

                <label>Email:</label>
                <input type="email" id="correo" name="correo" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                    placeholder="bananirou1@gmai.com">

                <br><br>

                <label>Telefono:</label>
                <input type="tel" id="telefono" name="telefono" pattern="\d{9}" maxlength="9" placeholder="640038795">


                <br><br>

                <label for="genero">Genero:</label>
                <br>
                <label>
                    <input type="radio" id="genero" name="genero">
                    Masculino
                </label>
                <br>
                <label>
                    <input type="radio" id="genero" name="genero">
                    Femenino
                </label>
                <br>
                <label>
                    <input type="radio" id="genero" name="genero">
                    Otro
                </label>

                <br><br>

                <label>Foto Alumno:</label>
                <br>
                <input type="file" id="filanueva" name="filanueva">
            </fieldset>
        </section>

        <section>
            <fieldset>
                <legend>Estudios</legend>

                <label>Nombre de Ciclo Formativo: <input value="Desarrollo de Aplicaciones Web (DAW)" type="text"
                        id="ciclo" name="ciclo" readonly size="30"></label>

                <br><br>

                <label>Curso/s en los que estas matriculado:</label>

                <br>

                <label for="curso1">
                    <input type="checkbox" id="curso1" name="curso1">
                    1º
                </label>

                <br>

                <label for="curso2">
                    <input type="checkbox" id="curso2" name="curso2">
                    2º
                </label>

                <br>

                <label for="cursoFCE">
                    <input type="checkbox" id="cursoFCE" name="cursoFCE">
                    FCE
                </label>

                <br>

                <label for="cursoFCT">
                    <input type="checkbox" id="cursoFCT" name="cursoFCT">
                    FCT
                </label>

                <br><br>

                <label>¿Por que has elegido este ciclo formativo?</label>
                <textarea rows="5" cols="70"></textarea>
            </fieldset>
        </section>

        <section>
            <label><button type="submit">Enviar</label>
            <label><button type="reset">Limpiar Formulario</button></label>
        </section>
    </form>

   <p><a href="../Ejercicio 4 , 5 y 6 HTML (LINKS)/Portafolio/IndicePortal.html">Volver a Mi Portal</p>
</body>

</html>
