<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Formulario</title>
</head>
<body>
	<h1>Formulario DAW</h1>
	<form action="http://jkorpela.fi/cgi-bin/echo.cgi" method="post">
		<fieldset>
			<legend>Datos del Alumno</legend>
			<label for="nombre">Nombre del Alumno</label>
			<input type="text" id="nombre" name="nombre" maxlength="15" required>
			<br><br>
			<label for="apellidos">Apellidos del Alumno</label>
			<input type="text" id="apellidos" name="apellidos" maxlength="30" required>
			<br><br>
			<label for="fec_nac">Fecha de Nacimiento</label>
			<input type="date" id="fec_nac" name="fec_nac" required>
			<br><br>
			<label for="identificacion">DNI o NIA</label>
			<input type="text" id="identificacion" name="identificacion" maxlength="9" pattern="[0-9]{8}[A-Z]" required>
			<br><br>
			<label for="email">E-mail</label>
			<input type="email" id="email" name="email" required>
			<br><br>
			<label for="telefono">Telefono</label>
			<input type="tel" id="telefono" name="telefono" required>
			<br><br>
			<label for="genero">Genero:</label>
			<br>
			<input type="radio" id="masc" name="genero" value="masculino"> Masculino
			<br>
			<input type="radio" id="fem" name="genero" value="femenino"> Femenino
			<br>
			<input type="radio" id="otro" name="genero" value="otro"> Otro
			<br><br>
			<label for="foto">Foto Alumno</label>
			<br>
			<input type="file" id="foto" name="foto">
		</fieldset>
		<br><br>
		<fieldset>
			<legend>Estudios</legend>
			<label for="ciclo">Nombre del Ciclo Formativo</label>
			<input type="text" id="ciclo" name="ciclo" size="34" value="Desarrollador de Aplicaciones Web (DAW)" readonly>
			<br><br>
			<label for="curso">Curso o Cursos en los que estas matriculado</label>
			<br>
			<input type="checkbox" id="curso" name="curso1" value="1º"> 1º
			<br>
			<input type="checkbox" id="curso" name="curso2" value="2º"> 2º
			<br>
			<input type="checkbox" id="curso" name="cursoFCE" value="FCE"> FCE
			<br>
			<input type="checkbox" id="curso" name="cursFCT" value="FCT"> FCT
			<br><br>
			<label for="doshite">¿Por que has elegido este ciclo formativo?</label>
			<br>
			<textarea id="doshite" name="doshite" rows="5" cols="70" required></textarea>
		</fieldset>
		<br>
		<input type="submit" value="Enviar">
		<input type="reset" value="Limpiar Formulario">
	</form>
	<br><br>
	<a href="IndicePortal.html">Volver a Mi Portal</a>
</body>
</html>
